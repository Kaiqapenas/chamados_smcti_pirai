<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SIGEC</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="auth-card">
        <div class="auth-header">
            <h1>SIGEC</h1>
            <p>Sistema Integrado de Gestão de Estoque e Chamados</p>
        </div>
        <div class="auth-body">
            <form action="#" method="POST" onsubmit="event.preventDefault();">
                <div class="auth-input-group">
                    <input type="text" placeholder="Matrícula" required>
                </div>
                <div class="auth-input-group">
                    <input type="password" placeholder="Senha" required>
                </div>
                <button type="submit" class="btn-green">Entrar</button>
            </form>
            <a href="recuperar_senha.html" class="forgot-link">Esqueci minha senha</a>
        </div>
        <div class="auth-footer">
            <img src="../img/prefeitura-pirai.png" alt="Prefeitura de Piraí">
        </div>
    </div>
</body>
</html>
