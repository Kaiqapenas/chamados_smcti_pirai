<!doctype html>
<html lang="pt-BR">
  <head>
    {% load static %}
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SIGEC - Sistema Integrado de Gestão de Estoque e Chamados</title>
    
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="{% static 'main/style.css' %}" />
  </head>
  <body>
    <header class="topbar">
      <div class="topbar-brand">
        <div class="brand-text">
          <div class="brand-name">SIGEC</div>
          <div class="brand-sub">Sistema Integrado de Gestão de Estoque e Chamados</div>
        </div>
      </div>

      <div class="topbar-actions">
        <div class="notif-menu-container" id="notifMenuContainer">
          <button class="icon-btn" title="Notificações" onclick="toggleNotifMenu()">
            <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="var(--gold)" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6 6 0 10-12 0v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" />
            </svg>
          </button>

          <div class="notif-dropdown" id="notifDropdown">
            <div class="notif-header"><span class="notif-title">Notificações</span></div>
            <div class="notif-list"><div class="notif-empty">Nenhuma notificação no momento.</div></div>
          </div>
        </div>

        <div class="user-menu-container" id="userMenuContainer">
          <button class="icon-btn user-btn" title="Perfil" onclick="toggleUserMenu()">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24">
              <g fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2">
                <circle cx="12" cy="8" r="5" /><path d="M20 21a8 8 0 1 0-16 0" /><line x1="4" y1="21.5" x2="20" y2="21.5" />
              </g>
            </svg>
          </button>

          <div class="user-dropdown" id="userDropdown">
            <div class="dropdown-header">
              <div class="dropdown-avatar">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24">
                  <g fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2">
                    <circle cx="12" cy="8" r="5" /><path d="M20 21a8 8 0 1 0-16 0" /><line x1="4" y1="21.5" x2="20" y2="21.5" />
                  </g>
                </svg>
              </div>
              <div class="user-info"><div class="name">Nome do Func.</div><div class="role">Cargo</div></div>
            </div>
            <div class="dropdown-divider"></div>
            <a href="#" class="dropdown-item">Alterar senha</a>
            <a href="#" class="dropdown-item">Sair</a>
          </div>
        </div>
      </div>
    </header>

    <div class="layout">
      <aside class="sidebar">
        <button class="sidebar-toggle-btn" onclick="toggleSidebar()" title="Recolher Menu">
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" />
          </svg>
        </button>

        <div class="sidebar-logo">
          <img src="{% static 'image/logo_prefeitura_2021.png' %}" alt="Logo" class="brand-logo" />
        </div>
        
        <div class="user-profile">
          <div class="avatar">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24">
              <g fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2">
                <circle cx="12" cy="8" r="5" /><path d="M20 21a8 8 0 1 0-16 0" /><line x1="4" y1="21.5" x2="20" y2="21.5" />
              </g>
            </svg>
          </div>
          <div class="user-info"><div class="name">Nome do Func.</div><div class="role">Cargo</div></div>
        </div>

        <nav class="nav">
          <div class="nav-item active" onclick="setActive(this)">
            <span class="nav-icon">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24">
                <g fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5">
                  <path d="M11.25 17.25a6 6 0 1 0 12 0a6 6 0 0 0-12 0m6-3v6m-3-3h6" />
                  <path d="M8.25 20.25h-6a1.5 1.5 0 0 1-1.5-1.5V2.25a1.5 1.5 0 0 1 1.5-1.5h10.629a1.5 1.5 0 0 1 1.06.439l2.872 2.872a1.5 1.5 0 0 1 .439 1.06V8.25" />
                </g>
              </svg>
            </span>
            <span class="nav-text">Título do Módulo</span>
          </div>
        </nav>
      </aside>

      <main class="main"></main>
    </div>

    <script>
      function setActive(el) {
        document.querySelectorAll(".nav-item").forEach((i) => i.classList.remove("active"));
        el.classList.add("active");
      }

      function toggleUserMenu() {
        document.getElementById('userDropdown').classList.toggle('show');
        document.getElementById('notifDropdown').classList.remove('show');
      }

      function toggleNotifMenu() {
        document.getElementById('notifDropdown').classList.toggle('show');
        document.getElementById('userDropdown').classList.remove('show');
      }

      window.addEventListener('click', function(e) {
        if (!document.getElementById('userMenuContainer').contains(e.target)) document.getElementById('userDropdown').classList.remove('show');
        if (!document.getElementById('notifMenuContainer').contains(e.target)) document.getElementById('notifDropdown').classList.remove('show');
      });

      function toggleSidebar() {
        document.body.classList.toggle('collapsed');
      }
    </script>
  </body>
</html>
